services:
  - type: web
    name: storic-whisper
    env: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn storic_whisper_site.wsgi:application
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "storicwhisper.com,www.storicwhisper.com,*.onrender.com"
      - key: CSRF_TRUSTED_ORIGINS
        value: "https://storicwhisper.com,https://www.storicwhisper.com"
      - key: DATABASE_URL
        fromDatabase:
          name: storic-whisper-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: storic-whisper-redis
          property: connectionString
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: storic-whisper-db
    plan: free
    databaseName: storic_whisper
    user: storic_whisper

  - type: redis
    name: storic-whisper-redis
    plan: free
    maxmemoryPolicy: allkeys-lru
